<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Misión de Drone</title>
    <link rel="stylesheet" href="../assets/libs/leaflet/leaflet.css">
    <link rel="stylesheet" href="./shared.css">
    <link rel="stylesheet" href="./mission.css">
</head>
<body>
    <div id="layout">

        <div id="map">
            <div id="zoom-controls">
                <button id="zoom-in"  type="button">+</button>
                <button id="zoom-out" type="button">−</button>
                <button id="btn-mode" type="button" title="Activar modo Pin"><img id="btn-mode-icon" src="../assets/images/Pin.png" alt="Pin"></button>
                <div id="mode-label">
                    <span id="mode-label-value" class="mode-label-value">DRAGGING</span>
                </div>
            </div>
        </div>

        <div id="panel">
            <div id="mission-status-bar" class="mission-status-bar hidden">
                <span id="mission-status-dot" class="mission-status-dot"></span>
                <span id="mission-status-text"></span>
            </div>
            <div id="panel-header">
                <button id="btn-back" type="button" class="btn-back">← Volver</button>
                <div id="drone-name"></div>
            </div>

            <div id="panel-body">

                <div class="panel-section">
                    <div class="section-title">Centro del área</div>
                    <div class="coord-row">
                        <span class="coord-label">LAT</span>
                        <span id="center-lat" class="coord-val">—</span>
                    </div>
                    <div class="coord-row">
                        <span class="coord-label">LON</span>
                        <span id="center-lon" class="coord-val">—</span>
                    </div>
                    <div id="center-hint" class="hint">Toca el mapa para colocar el centro</div>
                </div>

                <div class="panel-section">
                    <div class="section-title">Dimensiones</div>
                    <div class="slider-row">
                        <span class="slider-label">Ancho</span>
                        <input id="slider-width"  type="range" min="50" max="1500" value="500" step="50" class="area-slider">
                        <span id="val-width"  class="slider-val">500 m</span>
                    </div>
                    <div class="slider-row">
                        <span class="slider-label">Alto</span>
                        <input id="slider-height" type="range" min="50" max="1500" value="500" step="50" class="area-slider">
                        <span id="val-height" class="slider-val">500 m</span>
                    </div>
                </div>

                <div id="launch-wrap">
                    <button id="btn-launch" type="button" class="btn btn-primary" disabled>
                        Lanzar exploración
                    </button>
                </div>

            </div>
        </div>
    </div>

    <div id="modal" class="modal-overlay">
        <div class="modal-box">
            <div class="modal-title">¿Confirmar misión?</div>
            <div id="modal-body" class="modal-body"></div>
            <div class="modal-actions">
                <button id="modal-cancel"  type="button" class="btn">Cancelar</button>
                <button id="modal-confirm" type="button" class="btn btn-primary">✓ Confirmar misión</button>
            </div>
        </div>
    </div>

    <script src="../assets/libs/leaflet/leaflet.js"></script>
    <script src="./mission.js"></script>
    <script src="./mock.js"></script>
</body>
</html>
